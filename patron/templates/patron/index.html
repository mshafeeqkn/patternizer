{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <style>
#draggable-element {
  width: 100px;
  height: 10px;
  background-color: #fff;
  color: black;
  padding: 10px 12px;
  cursor: move;
  position: absolute;
  /* important (all position that's not `static`) */
}
  </style>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
        integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
  <link rel="stylesheet" href="{% static 'patron/css/styles.css' %}">
  <title>Image Loader</title>
</head>
<body>

<div class="container">
  <h3>Load new image</h3>
  <form method="post" action="{% url 'patron' %}" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="row">
      <div class="col-4">
        <div class="form-group">
          <label for="image-file">Please select new image</label>
          <input type="file" name="image-file" class="form-control-file" id="image-file">
        </div>
      </div>
      <div class="col-4">
        <button type="submit" class="btn btn-primary">Submit</button>
      </div>
    </div>
  </form>

  <div class="clear-fix-medium"></div>
  <div>
    <h3>Previous uploads</h3>
    <table>
      <tbody>
        {% for image in images %}
        <tr>
          <td><a href="{% url 'image_view' image.id %}">{{ image.name }}</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <!--img src="/media/images/Admit_Card_IIC.jpg" alt="Uploaded image"/-->
</div>


<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
        crossorigin="anonymous"></script>
</body>
</html>
