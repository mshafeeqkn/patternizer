{% load static %}
<!DOCTYPE html>

<html lang="en">
<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
        integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="{% static 'patron/css/styles.css' %}">
  <title>Image Loader</title>
</head>
<style>
  #mydiv {
    position: absolute;
    z-index: 9;
    background-color: #f1f1f1;
    text-align: center;
    border: 1px solid #d3d3d3;
  }

  #mydivheader {
    cursor: move;
    z-index: 10;
    background-color: #2196F3;
    color: #fff;
  }
</style>
<body>

<div class="container">
  <h4>Add new text</h4>
  <div class="row">
    <div class="col-4">
      <div class="form-group">
        <label for="text-field">Add new text</label>
        <input type="text" name="text" class="form-control form-control-sm" id="text-field" placeholder="Text">
      </div>
    </div>

    <div class="col-4">
      <div class="form-group">
        <label for="font">Select font</label>
        <select class="form-control form-control-sm" name="font" id="font">
          <option>None</option>
        </select>
      </div>
    </div>

    <div class="col-1">
      <button class="btn btn-primary btn-sm mt-fix-25">Add</button>
    </div>
  </div>
  <img src="/media/images/{{ image }}" alt="uploaded-image" id="image">


  <div id="mydiv">
    <div id="mydivheader" class="float-left">Click here to move</div>
    <i id="tick" class="fa fa-arrows float-left text-success tick" aria-hidden="true"></i>
    <i id="drag" class="fa fa-check float-left text-success tick" aria-hidden="true" onclick="onClickTick()"></i>
  </div>

  <div class="drag-item">
    <div>
      <span class="drag-btn"><i class="fa fa-arrows text-success" aria-hidden="true"></i></span>
      <span class="apply-btn"><i class="fa fa-check text-success" aria-hidden="true"></i></span>
    </div>
    <div class="drag-text">This is sample text</div>
  </div>
</div>


<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
        crossorigin="anonymous"></script>
<script src="{% static 'patron/scripts/patron.js' %}"></script>

<script>
    function onClickTick() {
        alert(this);
        $('#tick').hide()
    }

    //Make the DIV element draggagle:
    dragElement(document.getElementById("mydiv"));

    function dragElement(elmnt) {
        var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        var imageSize = $('#image').get(0).getBoundingClientRect();
        var textBoxSize = $('#mydivheader').get(0).getBoundingClientRect();

        elmnt.style.top = (imageSize.top + (imageSize.bottom - imageSize.top)/2) + "px";
        elmnt.style.left = (imageSize.left + (imageSize.right - imageSize.left)/2)+ "px";

        {#if (document.getElementById(elmnt.id + "header")) {#}
        {#    /* if present, the header is where you move the DIV from:*/#}
        {#    document.getElementById(elmnt.id + "header").onmousedown = dragMouseDown;#}
        {# } else {#}
            /* otherwise, move the DIV from anywhere inside the DIV:*/
            elmnt.onmousedown = dragMouseDown;
        {# }#}

        function dragMouseDown(e) {
            e = e || window.event;
            e.preventDefault();
            // get the mouse cursor position at startup:
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            // call a function whenever the cursor moves:
            document.onmousemove = elementDrag;
        }

        function elementDrag(e) {
            e = e || window.event;
            e.preventDefault();
            // calculate the new cursor position:
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;

            // set the element's new position:
            var top = (elmnt.offsetTop - pos2);
            if(top > imageSize.top && top < imageSize.bottom - (textBoxSize.bottom - textBoxSize.top))
              elmnt.style.top = top + "px";

            var left = (elmnt.offsetLeft - pos1);
            if(left > imageSize.left && left < imageSize.right - (textBoxSize.right - textBoxSize.left))
              elmnt.style.left = left + "px";

            console.log("The new position = (" + elmnt.style.top + ", " + elmnt.style.left + ")");
        }

        function closeDragElement() {
            /* stop moving when mouse button is released:*/
            document.onmouseup = null;
            document.onmousemove = null;
        }
    }


</script>

</body>
</html>
